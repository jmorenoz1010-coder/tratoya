        <h1>TratoYa — Compra y vende sin miedo</h1>
        <p>
          TratoYa es un intermediario de pagos entre personas en Colombia. El comprador paga a
          TratoYa con Nequi, Bancolombia o PSE; el dinero queda protegido en custodia y solo se
          libera al vendedor cuando el producto o servicio se entrega y se confirma.
        </p>
        <h2>Cómo funciona</h2>
        <ol>
          <li>Acuerdan el trato: precio, condiciones y plazos en un link compartido.</li>
          <li>El comprador paga a TratoYa, no al vendedor.</li>
          <li>El vendedor entrega con el pago asegurado.</li>
          <li>El comprador confirma y TratoYa transfiere al vendedor.</li>
        </ol>
        <h2>Si algo sale mal</h2>
        <p>
          Abres una disputa, revisamos la evidencia y si tienes razón te devolvemos el 100% de tu
          dinero. Soporte humano y resolución en hasta 72 horas.
        </p>
        <p>Comisión: 4.5% + 4×1000 por trato exitoso. Sin costos ocultos.</p>
