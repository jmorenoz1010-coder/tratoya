name: Deploy TratoYA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vercel project identifiers (not sensitive — same as .vercel/project.json)
env:
  VERCEL_ORG_ID: team_6apywbrXp3Za1uDp1ZgyhYpF

jobs:
  # ── Verificar que el backend arranca sin errores ────────
  test-backend:
    name: Backend lint & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tratoya-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-backend/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: node --check src/index.js

  # ── Verificar que el frontend compila ──────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tratoya-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_API_URL: https://api.tratoya.com/api
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: tratoya-frontend/dist
          retention-days: 1

  # ── Deploy backend → Vercel ────────────────────────────
  deploy-backend:
    name: Deploy backend → Vercel
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_PROJECT_ID: prj_0sznfk1NYdfsQBvirqW9BBRne5ha
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      # Se ejecuta desde la raíz del repo: el proyecto en Vercel ya tiene
      # Root Directory = tratoya-backend, por lo que correr el CLI dentro
      # de la subcarpeta duplica la ruta y rompe el deploy.
      - name: Vercel build backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token "$VERCEL_TOKEN" --yes
      - name: Deploy backend prebuilt → Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  # ── Deploy frontend → Vercel ───────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_PROJECT_ID: prj_XVFncHYwKu0SKjRMwmNAFAIpViBf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: tratoya-frontend
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      # Igual que el backend: se ejecuta desde la raíz del repo porque el
      # proyecto en Vercel tiene Root Directory = tratoya-frontend.
      - name: Vercel build frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: https://api.tratoya.com/api
        run: vercel build --prod --token "$VERCEL_TOKEN" --yes
      - name: Deploy frontend prebuilt → Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
