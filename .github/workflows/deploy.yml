name: Deploy TratoYA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Vercel project identifiers (not sensitive — same as .vercel/project.json)
env:
  VERCEL_ORG_ID: team_6apywbrXp3Za1uDp1ZgyhYpF
  VERCEL_PROJECT_ID: prj_XVFncHYwKu0SKjRMwmNAFAIpViBf

jobs:
  # ── Verificar que el backend arranca sin errores ────────
  test-backend:
    name: Backend lint & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tratoya-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-backend/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: node --check src/index.js

  # ── Verificar que el frontend compila ──────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tratoya-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: tratoya-frontend/dist
          retention-days: 1

  # ── Deploy a Vercel (solo en push a main) ──────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tratoya-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: tratoya-frontend
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Vercel build (genera .vercel/output)
        working-directory: tratoya-frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: https://tratoya-backend.up.railway.app/api
        run: vercel build --prod --token "$VERCEL_TOKEN" --yes
      - name: Deploy prebuilt → Vercel
        working-directory: tratoya-frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

  # ── Nota: Railway auto-despliega el backend en cada push a main ──
  # Railway está conectado directamente al repo de GitHub y detecta
  # los cambios en tratoya-backend/ automáticamente. No necesita
  # un paso explícito aquí.
